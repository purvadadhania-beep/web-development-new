<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>My Favourite Person Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #F0F0F2;
        }

        h1 {
            color: #FF5A43;
        }

        .card-label {
            font-size: 11px;
            color: #999;
            text-transform: uppercase;
        }

        pre {
            font-size: 13px;
            color: #333;
        }
    </style>
</head>

<body class="py-4">

    <div class="container">

        <h1 class="mb-1">My Favourite Person Profile</h1>
        <p class="text-muted mb-4">
            Introduction to Objects in JavaScript - Grade 4-6
        </p>

        <!-- Profile Card -->
        <div class="card shadow-sm mb-3" style="max-width:400px;">
            <div class="card-body">
                <h5 class="card-title" style="color:#FF5A43;">Profile Details</h5>
                <ul class="list-group list-group-flush">
                    <li class="list-group-item">
                        <span class="card-label d-block">Name</span>
                        <strong id="name">-</strong>
                    </li>
                    <li class="list-group-item">
                        <span class="card-label d-block">Relationship</span>
                        <strong id="relationship">-</strong>
                    </li>
                    <li class="list-group-item">
                        <span class="card-label d-block">Favourite Activity</span>
                        <strong id="activity">-</strong>
                    </li>
                    <li class="list-group-item">
                        <span class="card-label d-block">City</span>
                        <strong id="city">-</strong>
                    </li>
                </ul>
            </div>
        </div>

        <!-- Code Box -->
        <div class="card shadow-sm" style="max-width:400px;">
            <div class="card-body">
                <h6 style="color:#FF5A43;">JavaScript Object Used</h6>
                <pre id="codeDisplay" class="bg-light p-3 rounded border mb-0"></pre>
            </div>
        </div>

    </div><!-- /container -->

    <script>

        // Step 1 - Create the favourite person object
        var favouritePerson = {
            name: "Krisha Dadhania",
            relationship: "My sister",
            activity: "Playing with me",
            city: "lilongwe"
        };

        // Step 2 - Dot notation
        var nameEl = document.getElementById("name");
        var relationshipEl = document.getElementById("relationship");
        nameEl.textContent = favouritePerson.name;
        relationshipEl.textContent = favouritePerson.relationship;

        // Step 3 - Bracket notation
        var activityEl = document.getElementById("activity");
        var cityEl = document.getElementById("city");
        activityEl.textContent = favouritePerson["activity"];
        cityEl.textContent = favouritePerson["city"];

        // Show the object in the code box
        var codeEl = document.getElementById("codeDisplay");
        codeEl.textContent =
            'var favouritePerson = {\n' +
            '  name:         "' + favouritePerson.name + '",\n' +
            '  relationship: "' + favouritePerson.relationship + '",\n' +
            '  activity:     "' + favouritePerson["activity"] + '",\n' +
            '  city:         "' + favouritePerson["city"] + '"\n' +
            '};';

    </script>

</body>

</html>
